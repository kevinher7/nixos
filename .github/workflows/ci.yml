name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Run statix linting
        run: nix run nixpkgs#statix -- check .

  # macbook (kebee) is aarch64-darwin and cannot be built on a Linux runner,
  # so we evaluate it here as a safety net. The Linux hosts are covered by `build`.
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Evaluate macbook configuration
        run: >
          nix eval --show-trace
          '.#darwinConfigurations."kebee".config.system.build.toplevel.outPath'

  # Build the x86_64-linux hosts and push the results to Cachix. Building
  # implies evaluation, so these hosts don't need a separate eval step. Each
  # host builds in its own matrix job so they run in parallel.
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: [beans-btw, uribo-btw]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      # Persist the Nix store across runs so ephemeral runners don't re-download
      # the whole closure each time. Keyed on flake.lock (the expensive inputs);
      # GC trims build-only deps before saving, and stale caches are purged so
      # the matrix's two entries stay well under GitHub's 10 GB repo limit.
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ matrix.host }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ matrix.host }}-
          gc-max-store-size-linux: 4G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ matrix.host }}-
          purge-last-accessed: 604800
          purge-primary-key: never

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: kevinher7-nixos
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build ${{ matrix.host }} configuration
        run: >
          nix build --show-trace
          '.#nixosConfigurations."${{ matrix.host }}".config.system.build.toplevel'
