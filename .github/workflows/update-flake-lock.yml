name: Update flake.lock

on:
  schedule:
    - cron: "0 0 * * 4"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Snapshot current lockfile
        run: cp flake.lock "$RUNNER_TEMP/flake.lock.before"

      - name: Update flake.lock
        run: |
          set -o pipefail
          nix flake update --commit-lock-file 2>&1 | tee "$RUNNER_TEMP/flake-update-output.txt"

      - name: Generate pull request body
        run: |
          node .github/scripts/generate-flake-update-body.mjs \
            "$RUNNER_TEMP/flake.lock.before" \
            flake.lock \
            "$RUNNER_TEMP/pr-body.md" \
            "$RUNNER_TEMP/flake-update-output.txt"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.CREATE_PR_TOKEN }}
          branch: chore/update-flake-lock
          title: "chore: update flake.lock"
          body-path: ${{ runner.temp }}/pr-body.md
          delete-branch: true
